name: Build Windows EXE

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: build-windows-exe-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Detect project directory (PowerShell)
        id: detect
        shell: pwsh
        run: |
          $sln = git ls-files '*.sln' | Select-Object -First 1
          $csproj = git ls-files '*.csproj' | Select-Object -First 1
          if ($sln) {
            $projPath = Split-Path $sln -Parent
          } elseif ($csproj) {
            $projPath = Split-Path $csproj -Parent
          } else {
            $projPath = '.'
          }
          Write-Host "PROJECT_DIR=$projPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Detected project directory: $projPath"

      - name: Verify WinForms configuration (PowerShell)
        shell: pwsh
        run: |
          $csproj = git ls-files "$env:PROJECT_DIR\*.csproj" | Select-Object -First 1
          if (-not $csproj) {
            Write-Host "No .csproj found in PROJECT_DIR; skipping WinForms check."
            exit 0
          }
          $content = Get-Content $csproj -Raw
          if ($content -match '<TargetFramework>.*-windows' -or $content -match '<UseWindowsForms>\s*true\s*</UseWindowsForms>') {
            Write-Host "Project appears configured for Windows/WinForms."
            exit 0
          }
          Write-Error "Project may be missing a Windows target or UseWindowsForms. Edit the .csproj to include:
  <TargetFramework>net8.0-windows</TargetFramework>
  <UseWindowsForms>true</UseWindowsForms>
Or add 'using System;' to generated Designer files as a temporary workaround."
          exit 1

      - name: Restore dependencies
        shell: pwsh
        run: |
          dotnet restore
        working-directory: ${{ env.PROJECT_DIR }}

      - name: Build and publish
        shell: pwsh
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -p:PublishTrimmed=false
        working-directory: ${{ env.PROJECT_DIR }}

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: JJS-Autoplayer-${{ github.run_id }}
          path: |
            **/bin/Release/**/publish/**
            **/publish/**
