name: Build Windows EXE

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: build-windows-exe-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2022
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore JJSAutoplayer/JJsAutoplayer.csproj

      - name: Publish Windows build
        run: >
          dotnet publish JJSAutoplayer/JJsAutoplayer.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=false
          -p:PublishTrimmed=false
          -o publish/JJS-AutoPlayer

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: JJS-AutoPlayer-${{ github.run_number }}
          path: publish/JJS-AutoPlayer/**
