name: Build Windows EXE

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: build-windows-exe-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Detect project file and set PROJECT_DIR
        shell: bash
        run: |
          proj=$(git ls-files '*.sln' | head -n 1)
          if [ -z "$proj" ]; then
            proj=$(git ls-files '*.csproj' | head -n 1)
          fi
          if [ -n "$proj" ]; then
            projdir=$(dirname "$proj")
            echo "Found project file: $proj"
            echo "PROJECT_DIR=$projdir" >> $GITHUB_ENV
          else
            echo "PROJECT_DIR=." >> $GITHUB_ENV
            echo "ERROR: No .sln or .csproj found in the repository. If your project is in a subfolder, set PROJECT_DIR manually or move the project to the repo root." >&2
            exit 1
          fi

      - name: Verify Windows Forms configuration
        shell: bash
        run: |
          csproj=$(git ls-files "${PROJECT_DIR}/*.csproj" | head -n 1)
          if [ -z "$csproj" ]; then
            echo "No .csproj found in PROJECT_DIR; skipping WinForms check."
            exit 0
          fi
          if grep -qE "<TargetFramework>.*-windows" "$csproj" || grep -q "<UseWindowsForms>true</UseWindowsForms>" "$csproj"; then
            echo "Project appears configured for Windows/WinForms."
            exit 0
          fi
          echo "ERROR: Project may be missing Windows target or UseWindowsForms. To build WinForms apps, update the .csproj:" >&2
          echo "  <TargetFramework>net8.0-windows</TargetFramework>" >&2
          echo "  <UseWindowsForms>true</UseWindowsForms>" >&2
          exit 1

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ${{ env.PROJECT_DIR }}

      - name: Build and publish
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -p:PublishTrimmed=false
        working-directory: ${{ env.PROJECT_DIR }}

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: JJS-Autoplayer-${{ github.run_id }}
          path: |
            **/bin/Release/**/publish/**
            **/publish/**
