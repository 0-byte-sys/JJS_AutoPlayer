name: Build Windows EXE

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: build-windows-exe-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v3
        with:
          dotnet-version: '8.0.x'

      - name: Detect project directory
        shell: bash
        run: |
          # Find a solution or project file in the repo
          proj=$(git ls-files '*.sln' | head -n 1)
          if [ -z "$proj" ]; then
            proj=$(git ls-files '*.csproj' | head -n 1)
          fi

          if [ -n "$proj" ]; then
            projdir=$(dirname "$proj")
            echo "Found project file: $proj"
            echo "PROJECT_DIR=$projdir" >> $GITHUB_ENV
          else
            # No project/solution found — set PROJECT_DIR to repo root but fail early with a clear message
            echo "PROJECT_DIR=." >> $GITHUB_ENV
            echo "ERROR: No .sln or .csproj found in the repository. If your project is in a subfolder, either move it to the repo root or update the workflow to point to the correct path." >&2
            exit 1
          fi

      - name: Restore dependencies
        run: dotnet restore
        working-directory: ${{ env.PROJECT_DIR }}

      - name: Build and publish
        run: |
          dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=false -p:PublishTrimmed=false
        working-directory: ${{ env.PROJECT_DIR }}

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: JJS-Autoplayer-${{ github.run_id }}
          path: |
            **/bin/Release/**/publish/**
            **/publish/**
